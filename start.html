<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | Portfolio</title>
  <style>
    body{
         font-family: "Inter" ,sans-serif;
        padding: 0;
        margin: 0;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
       }
       main{ 
        flex: 1;
       }
    .header-container{
         display: flex;
         flex-direction: column;
         gap: 8px;
         margin: 0;
       }
       .subtitle {
        line-height: 1.7;
        font-size: 1.05rem;
       }
   header{
        background-color: #0d6efd; 
        color: white;
        text-align: center;
        padding: 30px 10px;
        margin: 0;
        height: 15vh;
       }
    header h1{
         margin:0;
         margin-top: 12px;
         }
    .intro {
        padding: 20px 0;
        max-width: 700px;
        margin: 0 auto;
        text-align: center;
        line-height:1.7;
    }
    .intro h2 { 
        font-size: 1.35rem; 
        margin-bottom: 10px;
         color:#0d6efd;
     }
    .intro p { 
        margin: 0 0 18px; 
        color:#333;
         line-height:1.5;
     }
    .btn { 
        display: inline-block;
         background: #0d6efd;
         color: #fff; 
        border: 0;
         border-radius: 10px; 
        padding: 10px 18px;
         text-decoration: none; 
        font-weight: 600;
         transition: background .2s ease, transform .2s ease; 
    }
    .btn:hover { 
        background:#0b5ed7;
         transform: translateY(-2px);
         margin-top: auto;
     }
   footer{
        padding: 10px;
        text-align: center;
       margin-top: auto;
       }
  </style>
</head>
<body>
  <main>
    <div class="header-container">
    <header>
        <br>
      <h1 data-key="title"> 💼 Welcome to My Portfolio</h1>
      <p>Start here to explore my projects, skills, and resume.</p>
    </header>
    <section class="intro">
      <h2 data-key="title"> 👋 Hi, I’m an IT engineering student building practical web apps.

</h2>
      <p class="subtitle" data-key="subtitle">This page introduces my work and skills. Click below to go directly to the main portfolio sections.</p>
      <a class="btn" href="index.html" class_info="info-link">Go to Portfolio</a>
    </section>
  </main>
    <footer>
       <p data-key="footer">My Portfolio © 2026</p>
    </footer>
  </div>
</body>
</html>
